name: Publish to npm

# npm-ONLY publisher, and the ONLY workflow that can publish via OIDC trusted
# publishing: the npmjs.com trusted publisher is bound to this exact filename
# (publish.yml). No NPM_TOKEN secret is needed (or set on this repo).
#
# fieldpass has no auto-release workflow — tags + GitHub releases are cut
# manually. Bump + tag + release first, then dispatch this (--ref main, NEVER
# master) to push that version to npm. Running it without a matching
# tag/release leaves git and npm out of sync (npm-drift.yml flags that state
# the next morning).
#
# Idempotent: if npm already has package.json's version, the run exits green
# without publishing — safe to re-dispatch any time.
#
# Tests run without the optional CDP/Claude deps, mirroring ci.yml.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Trusted publishing (OIDC) needs npm >=11.5.1; Node 24 bundles npm 11.
          # ci.yml still tests on the supported runtime floor.
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Skip if npm already has this version
        id: gate
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          published=$(npm view "${name}@${version}" version 2>/dev/null || echo "")
          if [ "$published" = "$version" ]; then
            echo "npm already has ${name}@${version}; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci --omit=optional --no-audit --no-fund
        if: steps.gate.outputs.skip != 'true'
      - run: npm test
        if: steps.gate.outputs.skip != 'true'
      # Auth = OIDC via the npmjs.com trusted publisher bound to THIS workflow
      # filename (publish.yml) — no NPM_TOKEN. Provenance is automatic under OIDC.
      - run: npm publish --access public
        if: steps.gate.outputs.skip != 'true'
