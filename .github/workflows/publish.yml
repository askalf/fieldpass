name: Publish to npm

# Manual npm publisher (workflow_dispatch only). Tests run without the optional
# CDP/Claude deps, mirroring ci.yml. Publishes with provenance.
# Requires the NPM_TOKEN repo secret (an all-packages + bypass-2FA token).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm publish --provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci --omit=optional --no-audit --no-fund
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
