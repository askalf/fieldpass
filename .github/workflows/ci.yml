name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      # tests need only node-html-parser; the CDP + Claude paths are optional deps
      - run: npm ci --omit=optional --no-audit --no-fund
      - run: npm test

  # Exercise the declared engines floor (package.json engines.node >= 20). Kept a
  # SEPARATE job so `test` stays the single required-status context for branch
  # protection instead of becoming a matrix-suffixed `test (20)` / `test (22)`.
  test-node20:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci --omit=optional --no-audit --no-fund
      - run: npm test
